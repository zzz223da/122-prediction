    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #eef2f6; padding: 12px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 16px; color: #0f172a; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        
        /* 联赛组 */
        .league-group { margin-bottom: 16px; border-radius: 16px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .league-header { padding: 16px 18px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .league-header h2 { font-size: 18px; font-weight: 700; color: #1e293b; }
        .league-header .arrow { font-size: 18px; color: #64748b; transition: transform 0.2s; }
        .league-header.collapsed .arrow { transform: rotate(-90deg); }
        .league-matches { background: #fff; transition: max-height 0.3s; }
        .league-matches.collapsed { display: none; }

        /* 比赛卡片 */
        .match-card { border-bottom: 1px solid #f1f5f9; }
        .match-card:last-child { border-bottom: none; }
        .match-summary { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; background: #fff; transition: background 0.1s; }
        .match-summary:active { background: #f1f5f9; }
        .match-info { flex: 1; }
        .match-teams { font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
        .match-meta { font-size: 12px; color: #64748b; display: flex; gap: 10px; }
        .quick-probs { display: flex; gap: 12px; align-items: center; }
        .quick-prob { text-align: center; }
        .quick-prob .label { font-size: 11px; color: #94a3b8; }
        .quick-prob .value { font-size: 16px; font-weight: 700; }
        .home { color: #059669; } .draw { color: #d97706; } .away { color: #dc2626; }
        .expand-icon { margin-left: 8px; color: #94a3b8; font-size: 16px; transition: transform 0.2s; }
        .match-card.expanded .expand-icon { transform: rotate(90deg); }

        /* 详情区域 */
        .match-detail { padding: 0 18px 18px 18px; background: #fafcff; border-top: 1px solid #eef2f6; display: none; }
        .match-card.expanded .match-detail { display: block; }
        
        .detail-section { margin-top: 16px; }
        .detail-title { font-size: 14px; font-weight: 600; color: #334155; margin-bottom: 10px; display: flex; align-items: center; }
        .detail-title span { width: 4px; height: 16px; background: #3b82f6; border-radius: 4px; margin-right: 8px; }

        /* 阵容表格 */
        .lineup-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .lineup-table td { padding: 6px 4px; border-bottom: 1px solid #e2e8f0; }
        .lineup-table tr:last-child td { border-bottom: none; }
        .pos { color: #64748b; width: 30px; }
        .number { color: #94a3b8; width: 30px; text-align: right; }
        .name { font-weight: 500; }

        /* 概率对比 */
        .prob-compare { display: flex; justify-content: space-between; background: #f1f5f9; border-radius: 12px; padding: 12px; }
        .prob-item { text-align: center; }
        .prob-item .label { font-size: 12px; color: #64748b; }
        .prob-item .model { font-size: 18px; font-weight: 700; color: #2563eb; }
        .prob-item .market { font-size: 14px; color: #7c3aed; margin-top: 2px; }

        /* 因子条 */
        .factor-item { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 13px; }
        .factor-name { width: 80px; }
        .factor-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .factor-fill-positive { height: 100%; background: #059669; }
        .factor-fill-negative { height: 100%; background: #dc2626; }

        .high-value { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 8px 12px; border-radius: 8px; margin: 12px 0; font-size: 13px; }
        .footer { text-align: center; color: #9ca3af; font-size: 12px; margin-top: 20px; }
    </style>
</head>
