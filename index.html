<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>122 足球预测 · H5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f5f7fa; height: 100vh; display: flex; flex-direction: column; }
        .app { max-width: 450px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        
        .page { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .page.active { display: block; }
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
        .header h1 { font-size: 22px; font-weight: 700; color: #1e293b; }
        .header-actions { display: flex; gap: 16px; }
        
        .search-box { margin-bottom: 16px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px 12px 40px; border: 1px solid #e2e8f0; border-radius: 30px; font-size: 15px; background: #f8fafc; outline: none; }
        .search-box input:focus { border-color: #3b82f6; background: #fff; }
        .search-box .search-icon { position: absolute; left: 14px; top: 12px; color: #94a3b8; }
        
        .tab-bar { display: flex; align-items: center; justify-content: space-around; padding: 8px 12px; border-top: 1px solid #f0f0f0; background: #fff; }
        .tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #94a3b8; font-size: 12px; cursor: pointer; }
        .tab-item.active { color: #3b82f6; }
        .tab-item .icon { font-size: 22px; }
        
        .hero-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 20px; padding: 20px; color: #fff; margin-bottom: 20px; }
        .hero-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .hero-sub { opacity: 0.8; font-size: 14px; margin-bottom: 16px; }
        .hero-stats { display: flex; gap: 20px; }
        .hero-stat .value { font-size: 28px; font-weight: 700; }
        .hero-stat .label { font-size: 12px; opacity: 0.7; }
        
        .section-title { font-size: 18px; font-weight: 600; color: #1e293b; margin: 20px 0 12px; display: flex; align-items: center; }
        .section-title span { width: 6px; height: 20px; background: #3b82f6; border-radius: 6px; margin-right: 10px; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .quick-item { background: #f8fafc; border-radius: 16px; padding: 16px; text-align: center; border: 1px solid #eef2f6; cursor: pointer; }
        .quick-item .emoji { font-size: 28px; margin-bottom: 6px; }
        .quick-item .label { font-size: 14px; font-weight: 500; color: #334155; }
        
        .league-group { margin-bottom: 20px; border-radius: 18px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; }
        .league-header { padding: 14px 16px; background: #fafcff; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-bottom: 1px solid #eef2f6; }
        .league-header h3 { font-size: 17px; font-weight: 700; color: #0f172a; }
        .league-header .badge { background: #e2e8f0; padding: 2px 10px; border-radius: 20px; font-size: 12px; color: #475569; }
        .league-header .arrow { color: #64748b; transition: transform 0.2s; }
        .league-header.collapsed .arrow { transform: rotate(-90deg); }
        .league-matches.collapsed { display: none; }
        
        .match-card { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .match-card:active { background: #f8fafc; }
        .match-teams { font-size: 16px; font-weight: 600; color: #0f172a; margin-bottom: 6px; }
        .match-meta { font-size: 12px; color: #64748b; display: flex; gap: 12px; margin-bottom: 8px; }
        .quick-probs { display: flex; gap: 16px; margin-top: 6px; }
        .quick-prob { text-align: center; }
        .quick-prob .label { font-size: 11px; color: #94a3b8; }
        .quick-prob .value { font-size: 16px; font-weight: 700; }
        .home { color: #059669; } .draw { color: #d97706; } .away { color: #dc2626; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: flex-end; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 450px; margin: 0 auto; border-radius: 28px 28px 0 0; padding: 24px 20px; max-height: 80vh; overflow-y: auto; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { font-size: 20px; font-weight: 700; }
        .close-btn { font-size: 28px; color: #94a3b8; cursor: pointer; }
        
        .profile-card { background: #f8fafc; border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .avatar { width: 60px; height: 60px; background: #3b82f6; border-radius: 30px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 28px; }
        .profile-info h4 { font-size: 18px; font-weight: 600; }
        .profile-info p { color: #64748b; font-size: 14px; }
        
        .menu-list { background: #fff; border-radius: 18px; border: 1px solid #f1f5f9; overflow: hidden; }
        .menu-item { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f1f5f9; }
        .menu-item:last-child { border-bottom: none; }
        .menu-item .icon { font-size: 22px; width: 30px; }
        .menu-item .label { flex: 1; font-weight: 500; }
        .menu-item .value { color: #64748b; }
        
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .empty { text-align: center; padding: 30px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="app">
    <div class="header" id="appHeader">
        <h1 id="pageTitle">122 预测</h1>
        <div class="header-actions">
            <span>🔔</span>
            <span>⚙️</span>
        </div>
    </div>
    
    <!-- 首页 -->
    <div id="homePage" class="page active">
        <div class="hero-card">
            <div class="hero-title">⚽ 今日赛事</div>
            <div class="hero-sub" id="todaySummary">加载中...</div>
            <div class="hero-stats">
                <div class="hero-stat"><div class="value" id="matchCount">--</div><div class="label">场比赛</div></div>
                <div class="hero-stat"><div class="value" id="modelAcc">--</div><div class="label">模型准确率</div></div>
            </div>
        </div>
        
        <div class="section-title"><span></span>热门推荐</div>
        <div class="quick-grid">
            <div class="quick-item" onclick="switchTab('matches')">
                <div class="emoji">📋</div>
                <div class="label">全部赛事</div>
            </div>
            <div class="quick-item" onclick="switchTab('matches')">
                <div class="emoji">🔥</div>
                <div class="label">高价值</div>
            </div>
            <div class="quick-item" onclick="switchTab('profile')">
                <div class="emoji">📊</div>
                <div class="label">准确率</div>
            </div>
            <div class="quick-item" onclick="switchTab('profile')">
                <div class="emoji">👤</div>
                <div class="label">我的</div>
            </div>
        </div>
        
        <div class="section-title"><span></span>即将开始</div>
        <div id="upcomingMatches" class="loading">加载中...</div>
    </div>
    
    <!-- 赛事页（含搜索） -->
    <div id="matchesPage" class="page">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索球队或联赛..." autocomplete="off">
        </div>
        <div id="matchesContainer" class="loading">加载中...</div>
    </div>
    
    <!-- 我的页 -->
    <div id="profilePage" class="page">
        <div class="profile-card">
            <div class="avatar">⚽</div>
            <div class="profile-info">
                <h4>122 用户</h4>
                <p>预测爱好者</p>
            </div>
        </div>
        
        <div class="section-title"><span></span>数据统计</div>
        <div class="menu-list">
            <div class="menu-item">
                <span class="icon">📈</span>
                <span class="label">模型准确率</span>
                <span class="value" id="profileModelAcc">--</span>
            </div>
            <div class="menu-item">
                <span class="icon">📊</span>
                <span class="label">市场准确率</span>
                <span class="value" id="profileMarketAcc">--</span>
            </div>
            <div class="menu-item">
                <span class="icon">⚖️</span>
                <span class="label">融合权重</span>
                <span class="value" id="profileFusionWeight">--</span>
            </div>
        </div>
        
        <div class="section-title"><span></span>关于</div>
        <div class="menu-list">
            <div class="menu-item">
                <span class="icon">ℹ️</span>
                <span class="label">版本</span>
                <span class="value">V3.1 H5</span>
            </div>
            <div class="menu-item">
                <span class="icon">🔄</span>
                <span class="label">数据更新</span>
                <span class="value" id="lastUpdate">--</span>
            </div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="tab-bar">
        <div class="tab-item active" data-tab="home">
            <span class="icon">🏠</span>
            <span>首页</span>
        </div>
        <div class="tab-item" data-tab="matches">
            <span class="icon">⚽</span>
            <span>赛事</span>
        </div>
        <div class="tab-item" data-tab="profile">
            <span class="icon">👤</span>
            <span>我的</span>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">比赛详情</h3>
            <span class="close-btn" onclick="closeModal()">✕</span>
        </div>
        <div id="modalBody">加载中...</div>
    </div>
</div>

<script>
    let appData = null;
    let currentTab = 'home';
    let searchKeyword = '';
    
    // 切换Tab
    function switchTab(tabId) {
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab-item[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(tabId + 'Page').classList.add('active');
        
        const titles = { home: '122 预测', matches: '全部赛事', profile: '我的' };
        document.getElementById('pageTitle').innerText = titles[tabId];
        currentTab = tabId;
        
        if (tabId === 'matches' && appData) renderMatchesPage();
        if (tabId === 'profile' && appData) renderProfilePage();
        if (tabId === 'home' && appData) renderHomePage();
    }
    
    // 加载数据
    async function loadData() {
        try {
            const res = await fetch('data.json');
            appData = await res.json();
            renderHomePage();
            renderMatchesPage();
            renderProfilePage();
        } catch (e) {
            document.querySelectorAll('.loading').forEach(el => el.innerHTML = '<div class="empty">数据加载失败</div>');
        }
    }
    
    // 过滤比赛
    function filterMatches(matches) {
        if (!searchKeyword) return matches;
        const kw = searchKeyword.toLowerCase();
        return matches.filter(m => 
            m.homeTeam.toLowerCase().includes(kw) || 
            m.awayTeam.toLowerCase().includes(kw) || 
            (m.league || '').toLowerCase().includes(kw)
        );
    }
    
    // 首页
    function renderHomePage() {
        if (!appData) return;
        const matches = appData.matches || [];
        document.getElementById('matchCount').innerText = matches.length;
        document.getElementById('todaySummary').innerText = `${appData.date} · ${matches.length} 场比赛`;
        document.getElementById('modelAcc').innerText = '53.2%';
        
        const upcoming = matches.slice(0, 3);
        let html = '';
        upcoming.forEach(m => {
            html += `<div class="match-card" onclick="showDetail(${JSON.stringify(m).replace(/"/g, '&quot;')})">`;
            html += `<div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div>`;
            html += `<div class="match-meta">${m.date.split(' ')[1] || ''} · ${m.league}</div>`;
            html += `<div class="quick-probs">`;
            const probs = m.finalProbs || m.modelProbs || { home: 0.33, draw: 0.34, away: 0.33 };
            html += `<div class="quick-prob"><span class="label">主</span><span class="value home">${(probs.home*100).toFixed(0)}%</span></div>`;
            html += `<div class="quick-prob"><span class="label">平</span><span class="value draw">${(probs.draw*100).toFixed(0)}%</span></div>`;
            html += `<div class="quick-prob"><span class="label">客</span><span class="value away">${(probs.away*100).toFixed(0)}%</span></div>`;
            html += `</div></div>`;
        });
        document.getElementById('upcomingMatches').innerHTML = html || '<div class="empty">暂无即将开始比赛</div>';
    }
    
    // 赛事页
    function renderMatchesPage() {
        if (!appData) return;
        const allMatches = appData.matches || [];
        const filtered = filterMatches(allMatches);
        
        if (filtered.length === 0) {
            document.getElementById('matchesContainer').innerHTML = '<div class="empty">没有找到匹配的比赛</div>';
            return;
        }
        
        const grouped = {};
        filtered.forEach(m => {
            const league = m.league || '其他';
            if (!grouped[league]) grouped[league] = [];
            grouped[league].push(m);
        });
        
        let html = '';
        for (let league in grouped) {
            html += `<div class="league-group">`;
            html += `<div class="league-header" onclick="toggleLeague(this)"><h3>${league}</h3><span class="badge">${grouped[league].length}</span><span class="arrow">▼</span></div>`;
            html += `<div class="league-matches">`;
            grouped[league].forEach(m => {
                const probs = m.finalProbs || m.modelProbs || { home: 0.33, draw: 0.34, away: 0.33 };
                html += `<div class="match-card" onclick="showDetail(${JSON.stringify(m).replace(/"/g, '&quot;')})">`;
                html += `<div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div>`;
                html += `<div class="match-meta">${m.date.split(' ')[1] || ''} · ${m.league}</div>`;
                html += `<div class="quick-probs">`;
                html += `<div class="quick-prob"><span class="label">主</span><span class="value home">${(probs.home*100).toFixed(0)}%</span></div>`;
                html += `<div class="quick-prob"><span class="label">平</span><span class="value draw">${(probs.draw*100).toFixed(0)}%</span></div>`;
                html += `<div class="quick-prob"><span class="label">客</span><span class="value away">${(probs.away*100).toFixed(0)}%</span></div>`;
                html += `</div>`;
                if (m.isHighValue) html += `<div style="color:#f59e0b;font-size:12px;margin-top:4px;">🔥 高价值</div>`;
                html += `</div>`;
            });
            html += `</div></div>`;
        }
        document.getElementById('matchesContainer').innerHTML = html;
    }
    
    // 个人页
    function renderProfilePage() {
        document.getElementById('profileModelAcc').innerText = '53.2%';
        document.getElementById('profileMarketAcc').innerText = '51.8%';
        document.getElementById('profileFusionWeight').innerText = appData ? (appData.fusionWeight * 100).toFixed(0) + '%' : '60%';
        document.getElementById('lastUpdate').innerText = appData ? appData.date : '--';
    }
    
    function toggleLeague(el) {
        const matchesDiv = el.nextElementSibling;
        matchesDiv.classList.toggle('collapsed');
        el.classList.toggle('collapsed');
    }
    
    function showDetail(match) {
        const probs = match.finalProbs || match.modelProbs || {};
        
        let html = `
            <div style="margin-bottom:20px;">
                <div style="font-size:22px;font-weight:700;margin-bottom:8px;">${match.homeTeam} vs ${match.awayTeam}</div>
                <div style="color:#64748b;">${match.date} · ${match.league}</div>
            </div>
            <div style="background:#f8fafc;border-radius:16px;padding:16px;margin-bottom:16px;">
                <div style="font-weight:600;margin-bottom:12px;">📊 胜平负概率</div>
                <div style="display:flex;justify-content:space-around;text-align:center;">
                    <div><div style="color:#64748b;">主胜</div><div style="font-size:24px;font-weight:700;color:#059669;">${(probs.home*100).toFixed(1)}%</div></div>
                    <div><div style="color:#64748b;">平局</div><div style="font-size:24px;font-weight:700;color:#d97706;">${(probs.draw*100).toFixed(1)}%</div></div>
                    <div><div style="color:#64748b;">客胜</div><div style="font-size:24px;font-weight:700;color:#dc2626;">${(probs.away*100).toFixed(1)}%</div></div>
                </div>
            </div>
            <div style="background:#f8fafc;border-radius:16px;padding:16px;margin-bottom:16px;">
                <div style="font-weight:600;margin-bottom:12px;">⚽ 比分倾向</div>
                <div style="display:flex;gap:8px;">
                    <span style="background:#e2e8f0;padding:6px 16px;border-radius:20px;">${match.bestScore || '--'}</span>
                    <span style="background:#e2e8f0;padding:6px 16px;border-radius:20px;">${match.secondScore || '--'}</span>
                </div>
            </div>
        `;
        
        if (match.isHighValue) {
            html += `<div style="background:#fffbeb;border-left:4px solid #f59e0b;padding:12px;border-radius:8px;margin-bottom:16px;">🔥 高价值关注：模型与市场分歧显著</div>`;
        }
        
        if (match.factors) {
            html += `<div style="margin-top:16px;"><div style="font-weight:600;margin-bottom:12px;">🔍 关键因子</div>`;
            match.factors.forEach(f => {
                const isPos = f.value > 0;
                const pct = Math.abs(f.value * 100).toFixed(0);
                html += `<div style="display:flex;align-items:center;gap:8px;margin:8px 0;"><span style="width:80px;">${f.name}</span><div style="flex:1;height:8px;background:#e2e8f0;border-radius:4px;"><div style="width:${pct}%;height:100%;background:${isPos?'#059669':'#dc2626'};border-radius:4px;"></div></div><span style="color:${isPos?'#059669':'#dc2626'};">${isPos?'+'+pct:'-'+pct}%</span></div>`;
            });
            html += `</div>`;
        }
        
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('detailModal').classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('detailModal').classList.remove('active');
    }
    
    // 搜索输入监听
    document.getElementById('searchInput').addEventListener('input', e => {
        searchKeyword = e.target.value;
        if (currentTab === 'matches') renderMatchesPage();
    });
    
    // 底部导航
    document.querySelectorAll('.tab-item').forEach(item => {
        item.addEventListener('click', () => switchTab(item.dataset.tab));
    });
    
    document.getElementById('detailModal').addEventListener('click', e => {
        if (e.target === document.getElementById('detailModal')) closeModal();
    });
    
    loadData();
</script>
</body>
</html>
